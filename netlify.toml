# Full Next.js (App Router + /api/*) on Netlify — optional IPFS static front (see IPFS_ENS.md).
# https://docs.netlify.com/frameworks/next-js/overview/
#
# Netlify UI: Site → Environment variables (same keys as .env.example).
# IPFS export: set NEXT_PUBLIC_API_BASE=https://YOUR_SITE.netlify.app (no slash).

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# CORS for static IPFS / *.eth.limo sites calling this origin for /api/*
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
